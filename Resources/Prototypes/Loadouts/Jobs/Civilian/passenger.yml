# Neck
- type: loadout
  id: Mantle
  equipment:
    neck: ClothingNeckMantle
  effects:
  - !type:GroupLoadoutEffect
    proto: MasterGrey

- type: startingGear
  id: Mantle
  equipment:
    neck: ClothingNeckMantle

# Back
- type: loadout
