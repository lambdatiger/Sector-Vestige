    proto: GreyTider
  equipment:
    jumpsuit: ClothingUniformColorRainbow
  groupBy: "rainbow" #Tag added by Sector-Vestige

# Rainbow Jumpskirt
- type: loadout
  id: RainbowJumpskirt
