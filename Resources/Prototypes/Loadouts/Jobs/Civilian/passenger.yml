# Greytide Time
- type: loadoutEffectGroup
  id: GreyTider
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobPassenger
      time: 10h # silly reward for people who play passenger a lot

# Head of Greytide (for grey mantle)
- type: loadoutEffectGroup
  id: MasterGrey
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobPassenger
      time: 20h # fun mantle for the most experienced greytiders

# Face
- type: loadout
  id: PassengerFace
  effects:
  - !type:GroupLoadoutEffect
    proto: GreyTider
  equipment:
    mask: ClothingMaskGas

# Jumpsuits
# Grey
- type: loadout
  id: GreyJumpsuit
  equipment:
    jumpsuit: ClothingUniformJumpsuitColorGrey
  groupBy: "jumpsuit" #Tag added by Sector-Vestige

- type: loadout
  id: GreyJumpskirt
  equipment:
    jumpsuit: ClothingUniformJumpskirtColorGrey
  groupBy: "jumpsuit" #Tag added by Sector-Vestige

# Rainbow
- type: loadout
  id: RainbowJumpsuit
  effects:
