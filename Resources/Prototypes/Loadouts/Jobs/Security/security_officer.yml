# Head
- type: loadout
  id: SecurityHelmet
  equipment:
    head: ClothingHeadHelmetBasic

- type: loadout
  id: SecurityHat
  equipment:
    head: ClothingHeadHatSecsoft

- type: loadout
  id: SecurityBeret
  equipment:
    head: ClothingHeadHatBeretSecurity

- type: loadout
  id: TrooperHat
  equipment:
    head: ClothingHeadHatSecurityTrooper

# Jumpsuit
- type: loadout
  id: SecurityJumpsuit
  equipment:
    jumpsuit: ClothingUniformJumpsuitSec
  groupBy: "jumpsuit" #Changed by SV

- type: loadout
  id: SecurityJumpskirt
  equipment:
    jumpsuit: ClothingUniformJumpskirtSec
  groupBy: "jumpsuit" #Changed by SV

- type: loadout
  id: SecurityJumpsuitGrey
  equipment:
    jumpsuit: ClothingUniformJumpsuitSecGrey
  groupBy: "grey" #Changed by SV

- type: loadout
  id: SecurityJumpskirtGrey
  equipment:
    jumpsuit: ClothingUniformJumpskirtSecGrey
  groupBy: "grey" #Changed by SV

- type: loadout
  id: TrooperUniform
  equipment:
    jumpsuit: ClothingUniformSecurityTrooper

