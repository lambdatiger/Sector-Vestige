# For mantles
- type: loadoutEffectGroup
  id: MasterCap
  effects:
  - !type:JobRequirementLoadoutEffect
    requirement:
      !type:RoleTimeRequirement
      role: JobCaptain
      time: 20h

# Jumpsuit
- type: loadout
  id: CaptainJumpsuit
  equipment:
    jumpsuit: ClothingUniformJumpsuitCaptain
  groupBy: "jumpsuit" #Added by SV

- type: loadout
  id: CaptainJumpskirt
  equipment:
    jumpsuit: ClothingUniformJumpskirtCaptain
  groupBy: "jumpsuit" #Added by SV

- type: loadout
  id: CaptainFormalSuit
  equipment:
    jumpsuit: ClothingUniformJumpsuitCapFormal
  groupBy: "formal" #Added by SV

- type: loadout
  id: CaptainFormalSkirt
  equipment:
    jumpsuit: ClothingUniformJumpskirtCapFormalDress
  groupBy: "formal" #Added by SV

# Head
- type: loadout
  id: CaptainHead
  equipment:
    head: ClothingHeadHatCaptain

- type: loadout
  id: CaptainCap
  equipment:
    head: ClothingHeadHatCapcap

# Neck
- type: loadout
  id: CaptainCloak
  equipment:
    neck: ClothingNeckCloakCap

- type: loadout
  id: CaptainCloakFormal
  equipment:
    neck: ClothingNeckCloakCapFormal

- type: loadout
  id: CaptainMantle
  equipment:
    neck: ClothingNeckMantleCap
