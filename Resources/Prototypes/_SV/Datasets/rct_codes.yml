# RC-codes for expendable RCT operatives (e.g. "Operative RC-14").
# Used as a RandomMetadata nameSegment, so it must be a localizedDataset:
# values resolve to LocId keys rct-operative-code-1 .. -99 (see datasets/rct-codes.ftl).
- type: localizedDataset
  id: RCTOperativeCodes
  values:
    prefix: rct-operative-code-
    count: 99
