- type: entity
  parent: [ClothingEyesBase, BaseEngineeringContraband]
  id: ClothingEyesSunglassesEngineering
  name: engineering glasses
  description: Upgraded sunglasses that provide flash immunity and a diagnostic HUD.
  components:
  - type: Sprite
    sprite: _SV/Clothing/Eyes/Glasses/engiglasses.rsi
  - type: Clothing
    sprite: _SV/Clothing/Eyes/Glasses/engiglasses.rsi
  - type: FlashImmunity
  - type: EyeProtection
    protectionTime: 5
  - type: Tag
    tags:
    - HamsterWearable
    - PetWearable
    - WhitelistChameleon
  - type: IdentityBlocker
    coverage: EYES
  - type: ShowHealthBars
    damageContainers:
    - Inorganic
    - Silicon

- type: entity
  parent: [ClothingEyesBase, ShowMedicalIcons]
  id: ClothingEyesSunglassesMedical
  name: medical glasses
  description: Upgraded sunglasses that provide flash immunity while displaying a humanoid's health status.
  components:
  - type: Sprite
    sprite: _SV/Clothing/Eyes/Glasses/medglasses.rsi
  - type: Clothing
    sprite: _SV/Clothing/Eyes/Glasses/medglasses.rsi
  - type: FlashImmunity
  - type: EyeProtection
    protectionTime: 5
  - type: Tag
    tags:
    - HudMedical
    - HamsterWearable
    - PetWearable
    - WhitelistChameleon
  - type: IdentityBlocker
    coverage: EYES
