  description: A hard-wearing labcoat issued to field researchers of NanoTrasen's Directorate of Research & Development.
  components:
  - type: Sprite
    sprite: _SV/Clothing/OuterClothing/Coats/rnd_field_researcher_labcoat.rsi
  - type: Clothing
    sprite: _SV/Clothing/OuterClothing/Coats/rnd_field_researcher_labcoat.rsi

- type: entity
  parent: [ ClothingOuterStorageFoldableBaseOpened, ClothingOuterCoatLabRnDFieldResearcher ]
