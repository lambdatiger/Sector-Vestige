# NanoTrasen R&D headset - tuned to the Directorate's private channel.
- type: entity
  parent: [ ClothingHeadset, BaseCentcommContraband ]
  id: ClothingHeadsetRnD
  name: R&D headset
  description: A headset used by the Directorate of Research & Development. Keyed to channels well above your clearance.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyRnD
      - EncryptionKeyCommon
      - EncryptionKeyHailing #Sector Vestige
  - type: Sprite
    sprite: _SV/Clothing/Ears/Headsets/R&D.rsi
  - type: Clothing
    sprite: _SV/Clothing/Ears/Headsets/R&D.rsi

# Over-ear variant - lower profile, for covert Field Agents / discreet wear.
- type: entity
  parent: [ ClothingHeadsetAlt, BaseCentcommContraband ]
  id: ClothingHeadsetAltRnD
  name: R&D over-ear headset
  description: A discreet over-ear headset used by the Directorate of Research & Development.
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyRnD
      - EncryptionKeyCommon
      - EncryptionKeyHailing #Sector Vestige
  - type: Sprite
    sprite: _SV/Clothing/Ears/Headsets/R&D.rsi
  - type: Clothing
    sprite: _SV/Clothing/Ears/Headsets/R&D.rsi
