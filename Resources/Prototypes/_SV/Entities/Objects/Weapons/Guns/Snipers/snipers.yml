- type: entity
  name: SCR-g2 'Suggestion'
  parent: [BaseWeaponSubMachineGun, BaseSyndicateContraband]
  id: WeaponSniperSCRSuggestion
  description: A new-generation Syndicate sniper rifle. You don't know much about it, but given that it feeds from .338 Lapua, it certainly packs a punch. There's a small Pommersk Eagle logo near the trigger.
  components:
  - type: Sprite
    sprite: _SV/Objects/Weapons/Guns/Snipers/Suggestion.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _SV/Objects/Weapons/Guns/Snipers/Suggestion.rsi
    slots:
    - Back
    - suitStorage
  - type: Wieldable
    unwieldOnUse: false
  - type: GunRequiresWield
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 20
    pvsIncrease: 0.5
  - type: Gun
    minAngle: 0
    maxAngle: 120
    angleIncrease: 38
    angleDecay: 16
    fireRate: 0.25
    projectileSpeed: 48
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/sniper.ogg
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
  - type: ChamberMagazineAmmoProvider
    autoCycle: false
    canRack: false
    autoEject: false
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolViolee
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
        priority: 2
        whitelist:
          tags:
          - MagazineViolee
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        priority: 1
        whitelist:
          tags:
          - CartridgePistol
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
