- type: entity
  parent: BaseCartridgeMagnum
  id: CartridgeMagnumSpent
  name: cartridge (.45 magnum)
  suffix: spent
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Casings/ammo_casing.rsi
    layers:
    - state: base-spent
      map: [ "enum.AmmoVisualLayers.Base" ]
  - type: SpentAmmoVisuals
  - type: CartridgeAmmo
    proto: BulletMagnum
    spent: true
  - type: Tag
    tags:
    - CartridgeMagnum
    - Trash # surely theres a way to automatically add this...

