# NT R&D experimental tesla weaponry - the Arc Caster.
- type: entity
  name: X-5 Arc caster
  parent: [BaseWeaponPowerCell, BaseGunWieldable, BaseRnDContraband]
  id: WeaponArcCaster
  description: An experimental R&D directed-energy weapon that hurls fast bolts of contained lightning, shocking and stunning whatever they strike.
  components:
  - type: Item
    size: Large
  - type: Clothing
    sprite: _SV/Objects/Weapons/Guns/Experimental/arc_caster.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Sprite
    sprite: _SV/Objects/Weapons/Guns/Experimental/arc_caster.rsi
    layers:
      - state: icon
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-unshaded-4
        map: ["enum.GunVisualLayers.MagUnshaded"]
        shader: unshaded
  # Drives the four mag-unshaded charge states off the inserted cell's charge.
  # steps: 5 + zeroVisible: false cycles mag-unshaded-1..4 and hides the layer at empty (no mag-unshaded-0 sprite).
  - type: MagazineVisuals
    magState: mag
    steps: 5
    zeroVisible: false
  - type: Gun
    fireRate: 1.3
    projectileSpeed: 35
    selectedMode: SemiAuto
    availableModes:
    - SemiAuto
    soundGunshot:
      path: /Audio/Effects/Lightning/lightningshock.ogg
      params:
        variation: 0.2
  - type: GunRequiresWield
  - type: BatteryAmmoProvider
    proto: ArcCasterBolt
    fireCost: 60 # 12 shots from a full anomalous cell
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellAnomaly
        insertSound: /Audio/Weapons/Guns/MagIn/batrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/batrifle_magout.ogg
        whitelist:
          tags:
            - PowerCell
            - PowerCellSmall
  - type: Appearance

# The arc caster's bolt - a fast direct-hit lightning bolt. Despawns on impact (no embedding, no chaining):
- type: entity
  name: arc caster bolt
  id: ArcCasterBolt
  parent: BaseBullet
  categories: [ HideSpawnMenu ]
  components:
  - type: TimedDespawn
    lifetime: 5
  - type: Sprite
    sprite: Structures/Power/Generation/Tesla/energy_miniball.rsi
    layers:
    - state: tesla_projectile
      shader: unshaded
  - type: Projectile
    deleteOnCollide: true
    damage:
      types:
        Piercing: 4
        Shock: 4
        Heat: 10
  - type: StaminaDamageOnCollide
    damage: 15
  - type: Tag
    tags:
      - HideContextMenu
