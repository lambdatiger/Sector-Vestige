- type: entity
  parent: IDCardStandard
  id: MagistrateIDCard
  name: magistrate ID card
  description: A prestigious identification card bearing the seal of judicial authority from Central Command.
  components:
  - type: Sprite
    sprite: _SV/Objects/Misc/id_cards.rsi
    layers:
    - state: blue
    - state: sv-idmagistrate
  - type: PresetIdCard
    job: SVMagistrate

# NT R&D
# Directorate ID's
- type: entity
  parent: IDCardStandard
  id: RCTLeaderIDCard
  name: RCT leader ID card
  components:
  - type: Sprite
    layers:
    - state: centcom
    - state: stripe_top
      color: "#462749"
    - state: stripe_bottom
      color: "#2a172c"
    - sprite: /Textures/_SV/Interface/Misc/R&D_icons.rsi
      offset: -0.09375, 0.0625 # 3 pixels left, 2 pixels up
      state: RCTLeader
  - type: PresetIdCard
    job: RCTLeader
  - type: NanoChatCard # CD
    listNumber: false

- type: entity
  parent: IDCardStandard
  id: RCTMemberIDCard
  name: RCT ID card
  components:
  - type: Sprite
    layers:
    - state: centcom
    - state: stripe_top
      color: "#462749"
    - state: stripe_bottom
      color: "#2a172c"
    - sprite: /Textures/_SV/Interface/Misc/R&D_icons.rsi
      offset: -0.09375, 0.0625 # 3 pixels left, 2 pixels up
      state: RCT
  - type: PresetIdCard
    job: RCTMember
  - type: NanoChatCard # CD
    listNumber: false

