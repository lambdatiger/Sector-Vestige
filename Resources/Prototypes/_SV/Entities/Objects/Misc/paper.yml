- type: entity
  id: SVPaperDocumentation
  parent: Paper
  name: Documentation Paper
  description: Paper used for official NanoTrasen documentation
  components:
  - type: Sprite
    layers:
    - state: paper
    - state: paper_words
      map: ["enum.PaperVisualLayers.Writing"]
      visible: false
    - state: paper_stamp-generic
      map: ["enum.PaperVisualLayers.Stamp"]
      visible: false
  - type: Tag
    tags:
    - Document
    - Trash
    - Paper
  - type: PaperVisuals
    backgroundImagePath: "/Textures/Interface/Paper/paper_background_default.svg.96dpi.png"
    # contentImagePath: "/Textures/Interface/Paper/paper_content_lined.svg.96dpi.png"
    # backgroundModulate: "#aff774"
    # contentImageModulate: "#aff774"
    backgroundPatchMargin: 16.0, 16.0, 16.0, 16.0
    contentMargin: 0.0, 0.0, 0.0, 0.0
    headerMargin: 0.0, 16.0, 0.0, 0.0
  - type: StaticPrice
    price: 0

