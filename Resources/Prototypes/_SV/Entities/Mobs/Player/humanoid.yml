  parent: RandomHumanoidSpawnerRCTOperativeHeavy
  suffix: RCTRole, Operative, Heavy, EVA
  components:
    - type: RandomHumanoidSpawner
      settings: RCTOperativeHeavyEVA

# =========================================================================
