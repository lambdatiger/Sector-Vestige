- type: entity
  id: SVSMOffGas
  parent: BaseStationEventShortDelay
  components:
  - type: StationEvent
    earliestStart: 30
    minimumPlayers: 10
    weight: 1
    duration: 60
  - type: SMOffGas
    allowedGases:
    #Nitrogen
    - gas: Nitrogen
      spawnWeight: 8
      gasAmount:
        min: 400
        max: 1100
      molPerSecond:
        min: 10
        max: 50
    #Oxygen
    - gas: Oxygen
      spawnWeight: 4
      gasAmount:
        min: 400
        max: 800
      molPerSecond:
        min: 5
        max: 45
    #Nitrous
    - gas: NitrousOxide
      spawnWeight: 2
      gasAmount:
        min: 200
        max: 500
      molPerSecond:
        min: 5
        max: 25
    #Plasma
    - gas: Plasma
      spawnWeight: 1
      gasAmount:
        min: 400
        max: 500
      molPerSecond:
        min: 5
        max: 45
    #Carbon Dioxide
    - gas: CarbonDioxide
      spawnWeight: 6
      gasAmount:
        min: 500
        max: 950
      molPerSecond:
        min: 15
        max: 55
    #Steam (fight me)
    - gas: WaterVapor
      spawnWeight: 4
      gasAmount:
        min: 200
        max: 800
      molPerSecond:
        min: 15
        max: 45
    #Ammonia
    - gas: Ammonia
      spawnWeight: 4
      gasAmount:
        min: 200
        max: 900
      molPerSecond:
        min: 5
        max: 65
    #Frezon
    - gas: Frezon
      spawnWeight: 1
      gasAmount:
        min: 100
        max: 350
      molPerSecond:
        min: 2
        max: 10
    #Tritium
    - gas: Tritium
      spawnWeight: 1
      gasAmount:
        min: 100
        max: 800
      molPerSecond:
        min: 5
        max: 30
