# Personal item for Samnatha Cartor
- type: entity
  name: Samantha's pen
  parent: Pen
  id: PersonalItemSamanthaPen
  description: A well crafted and timeworn ink pen. Its body is made from a fine ivory, three colorful bird feathers protrude from the end.
  suffix: PersonalItem
  components:
  - type: Sprite
    sprite: _SV/PersonalItems/Items/samanthapen.rsi
    state: samantha-pen
  - type: Item
    sprite: _SV/PersonalItems/Items/samanthapen.rsi
    size: Tiny
    heldPrefix: feathery

- type: loadout
  id: PersonalItemSamanthaPen
  storage:
    back:
    - PersonalItemSamanthaPen
  effects:
  - !type:PersonalItemLoadoutEffect
    character:
    - Samantha Cartor
