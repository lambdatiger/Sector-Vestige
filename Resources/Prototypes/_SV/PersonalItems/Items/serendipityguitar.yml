    sprite: _SV/PersonalItems/Items/serendipityguitar.rsi
    state: icon
  - type: Item
    sprite: _SV/PersonalItems/Items/serendipityguitar.rsi
    size: Normal
  - type: Clothing
    quickEquip: false
