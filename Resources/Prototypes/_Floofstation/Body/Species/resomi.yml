- type: entity
  parent:
  - AppearanceResomi
  - BaseSpeciesMobOrganic
  id: MobResomi
  name: Urist McSmallRaptor
  components:
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 120
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: DamageVisuals
    thresholds: [ 10, 30, 50, 70 ]
    damageOverlayGroups:
      Brute:
        sprite: _Floofstation/Mobs/Effects/Resomi/brute_damage.rsi
        color: "#C048C2"
      Burn:
        sprite: _Floofstation/Mobs/Effects/Resomi/burn_damage.rsi
  - type: FireVisuals
    sprite: _Floofstation/Mobs/Effects/onfire.rsi
    normalState: Resomi_minor_burning
    alternateState: Resomi_burning
  - type: Icon
    sprite: _Floofstation/Mobs/Species/Resomi/parts.rsi
    state: full
  - type: MobThresholds
    thresholds:
      0: Alive
      85: Critical
      170: Dead
  - type: Speech
    speechVerb: Parrot
    speechSounds: MaleAvali
    allowedEmotes: ['Chirp', 'Coo'] # FloofStation - Coo
  - type: Vocal
    sounds:
      Male: MaleAvaliEmote
      Unsexed: MaleAvaliEmote
      Female: FemaleAvaliEmote
  - type: Butcherable
    butcheringType: Spike
    spawned:
    - id: FoodMeatChicken
      amount: 5
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: Damageable
    damageModifierSet: Resomi
  - type: MovementSpeedModifier
    weightlessAcceleration: 2.5

# Base organ definitions
- type: entity
  parent: OrganBase
  id: OrganResomi
  abstract: true
  suffix: resomi

- type: entity
  id: OrganResomiMetabolizer
  abstract: true
  components:
  - type: Metabolizer
    metabolizerTypes: [ Human ]

- type: entity
  parent: OrganResomi
  id: OrganResomiInternal
  abstract: true
  components:
  - type: Sprite
    sprite: Mobs/Species/Human/organs.rsi

- type: entity
  id: OrganResomiVisual
  abstract: true
  components:
  - type: VisualOrgan
    data:
      sprite: _Floofstation/Mobs/Species/Resomi/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Resomi

- type: entity
  parent: [ OrganResomi, OrganResomiVisual ]
  id: OrganResomiExternal
  abstract: true
  components:
  - type: Sprite
    sprite: _Floofstation/Mobs/Species/Resomi/parts.rsi

# External organs (body parts)
- type: entity
  parent: [ OrganBaseTorsoSexed, OrganBaseTorso, OrganResomiExternal ]
  id: OrganResomiTorso
  components:
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 10
      - ReagentId: Blood
        Quantity: 20

- type: entity
  parent: [ OrganBaseHeadSexed, OrganBaseHead, OrganResomiExternal ]
  id: OrganResomiHead
  components:
  - type: VisualOrganMarkings
    hideableLayers:
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.Snout
    - enum.HumanoidVisualLayers.HeadTop
    - enum.HumanoidVisualLayers.HeadSide
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 5
      - ReagentId: AmmoniaBlood
        Quantity: 10

- type: entity
  parent: [ OrganBaseArmLeft, OrganResomiExternal ]
  id: OrganResomiArmLeft

- type: entity
  parent: [ OrganBaseArmRight, OrganResomiExternal ]
  id: OrganResomiArmRight

- type: entity
  parent: [ OrganBaseHandLeft, OrganResomiExternal ]
  id: OrganResomiHandLeft

- type: entity
  parent: [ OrganBaseHandRight, OrganResomiExternal ]
  id: OrganResomiHandRight

- type: entity
  parent: [ OrganBaseLegLeft, OrganResomiExternal ]
  id: OrganResomiLegLeft

- type: entity
  parent: [ OrganBaseLegRight, OrganResomiExternal ]
  id: OrganResomiLegRight

- type: entity
  parent: [ OrganBaseFootLeft, OrganResomiExternal ]
  id: OrganResomiFootLeft

- type: entity
  parent: [ OrganBaseFootRight, OrganResomiExternal ]
  id: OrganResomiFootRight

# Internal organs
- type: entity
  parent: [ OrganBaseBrain, OrganSpriteHumanInternal, OrganResomiInternal ]
  id: OrganResomiBrain

- type: entity
  parent: [ OrganResomiVisual, OrganBaseEyes, OrganResomiInternal ]
  id: OrganResomiEyes
  components:
  - type: VisualOrgan
    data:
      sprite: _Floofstation/Mobs/Customization/eyes.rsi
      state: resomi

- type: entity
  parent: [ OrganBaseTongue, OrganResomiInternal ]
  id: OrganResomiTongue

- type: entity
  parent: [ OrganBaseEars, OrganSpriteHumanInternal, OrganResomiInternal ]
  id: OrganResomiEars

- type: entity
  parent: [ OrganBaseLungs, OrganResomiInternal, OrganResomiMetabolizer ]
  id: OrganResomiLungs

- type: entity
  parent: [ OrganBaseHeart, OrganResomiInternal, OrganResomiMetabolizer ]
  id: OrganResomiHeart

- type: entity
  parent: [ OrganBaseLiver, OrganSpriteHumanInternal, OrganResomiInternal, OrganResomiMetabolizer ]
  id: OrganResomiLiver

- type: entity
  parent: [ OrganBaseKidneys, OrganSpriteHumanInternal, OrganResomiInternal, OrganResomiMetabolizer ]
  id: OrganResomiKidneys
