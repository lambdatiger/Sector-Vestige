# Harmony ERT Shuttles

# Security

- type: entity
  id: ERTSecMedium
  parent: BaseUnknownShuttleRule
  components:
  - type: StationEvent
    startAnnouncement: station-event-ert-sec-shuttle-incoming #!!
    weight: 0 #  Admin only.
  - type: LoadMapRule
    preloadedGrid: ShuttleERTSecMedium

- type: entity
  id: ERTSecSmall
  parent: BaseUnknownShuttleRule
  components:
  - type: StationEvent
    startAnnouncement: station-event-ert-sec-shuttle-incoming #!!
