- type: entity
  parent: DrinkGlass
  id: DrinkAviationGlass
  suffix: aviation
  components:
  - type: SolutionContainerManager
    solutions:
      drink:
        maxVol: 30
        reagents:
        - ReagentId: AviationCocktail
          Quantity: 30
  - type: Icon
    sprite: _Harmony/Objects/Consumable/Drinks/aviationcocktail.rsi
