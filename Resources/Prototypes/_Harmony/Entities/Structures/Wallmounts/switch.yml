# Button frames
- type: entity
  id: ButtonFrameGreyBuildable
  parent: ButtonFrame
  suffix: grey, DO NOT MAP
  components:
    - type: Sprite
      drawdepth: SmallObjects
      sprite: Structures/Wallmounts/switch_frame.rsi
      state: grey
    - type: Construction
      graph: ButtonFrameGraph
      node: ButtonFrameGreyNode

