    - type: Sprite
      sprite: _Harmony/Clothing/Eyes/Glasses/cmo.rsi
    - type: Clothing
      sprite: _Harmony/Clothing/Eyes/Glasses/cmo.rsi
    - type: SolutionScanner
    - type: IdentityBlocker
