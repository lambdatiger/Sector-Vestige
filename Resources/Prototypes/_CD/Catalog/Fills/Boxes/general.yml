# Pride Pins Box
- type: entity
  parent: BoxCardboard
  id: BoxPridePins
  name: pride pin box
  description: This box is filled with pride.
  components:
    - type: StorageFill
      contents:
        - id: ClothingNeckLGBTPin
          amount: 1
        - id: ClothingNeckAromanticPin
          amount: 1
        - id: ClothingNeckAsexualPin
          amount: 1
        - id: ClothingNeckBisexualPin
          amount: 1
        - id: ClothingNeckIntersexPin
          amount: 1
        - id: ClothingNeckLesbianPin
          amount: 1
        - id: ClothingNeckNonBinaryPin
          amount: 1
        - id: ClothingNeckPansexualPin
          amount: 1
        - id: ClothingNeckTransPin
          amount: 1
    - type: Sprite
      sprite: _CD/Objects/Storage/boxes.rsi
      state: pride
