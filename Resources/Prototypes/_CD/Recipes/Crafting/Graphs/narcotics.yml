- type: constructionGraph
  id: WrappedBakePackage
  start: start
  graph:
  - node: start
    edges:
    - to: empty
      steps:
      - tag: EmptyPacket
        name: cd-construction-graph-an-empty-packet
        doAfter: 1
  - node: empty
    entity: EmptyPacket
    edges:
    - to: bakeWrapped
      steps:
      - tool: Screwing
        doAfter: 1
      conditions:
      - !type:MinSolution
        solution: drink
        reagent:
          ReagentId: Bake
        quantity: 10
  - node: bakeWrapped
    entity: WrappedBakePackage
