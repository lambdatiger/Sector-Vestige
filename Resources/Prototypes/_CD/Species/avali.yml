- type: species
  id: Avali
  name: species-name-avali
  roundStart: true
  prototype: MobAvali
  sprites: MobAvaliSprites
  defaultSkinTone: "#D2B48C"
  markingLimits: MobAvaliMarkingLimits
  dollPrototype: MobAvaliDummy
  skinColoration: Hues
  defaultHeight: 0.8
  maleFirstNames: names_avali_unisex
  femaleFirstNames: names_avali_unisex
  naming: First

- type: speciesBaseSprites
  id: MobAvaliSprites
  sprites:
    Head: MobAvaliHead
    UndergarmentTop: MobHumanoidAnyMarking
    UndergarmentBottom: MobHumanoidAnyMarking
    Chest: MobAvaliTorso
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    Tail: MobHumanoidAnyMarking
    Eyes: MobAvaliEyes
    LArm: MobAvaliLArm
    RArm: MobAvaliRArm
    LHand: MobAvaliLHand
    RHand: MobAvaliRHand
    LLeg: MobAvaliLLeg
    RLeg: MobAvaliRLeg
    LFoot: MobAvaliLFoot
    RFoot: MobAvaliRFoot

- type: humanoidBaseSprite
  id: MobAvaliEyes
  baseSprite:
    sprite: _CD/Mobs/Species/Avali/parts.rsi
    state: eyes

- type: markingPoints
  id: MobAvaliMarkingLimits
  onlyWhitelisted: true
  points:
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 0
      required: false
    Tail:
      points: 1
      required: true
      defaultMarkings: [ AvaliTailBase ]
    Snout:
      points: 1
      required: false
    HeadTop:
      points: 1
      required: false
    HeadSide:
      points: 1
      required: true
      defaultMarkings: [ AvaliEarsBase ]
    Chest:
      points: 1
      required: false
    Legs:
      points: 2
      required: false
    Arms:
      points: 4
      required: false

