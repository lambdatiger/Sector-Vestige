    hideableLayers:
    - enum.HumanoidVisualLayers.Hair
    - enum.HumanoidVisualLayers.Snout
    - enum.HumanoidVisualLayers.HeadTop
    - enum.HumanoidVisualLayers.HeadSide
    - enum.HumanoidVisualLayers.FacialHair

- type: entity
  parent: [ OrganBaseArmLeft, OrganFoxfolkExternal ]
  id: OrganFoxfolkArmLeft

- type: entity
  parent: [ OrganBaseArmRight, OrganFoxfolkExternal ]
  id: OrganFoxfolkArmRight

- type: entity
  parent: [ OrganBaseHandLeft, OrganFoxfolkExternal ]
  id: OrganFoxfolkHandLeft

- type: entity
  parent: [ OrganBaseHandRight, OrganFoxfolkExternal ]
  id: OrganFoxfolkHandRight

- type: entity
  parent: [ OrganBaseLegLeft, OrganFoxfolkExternal ]
  id: OrganFoxfolkLegLeft

- type: entity
  parent: [ OrganBaseLegRight, OrganFoxfolkExternal ]
  id: OrganFoxfolkLegRight

- type: entity
  parent: [ OrganBaseFootLeft, OrganFoxfolkExternal ]
  id: OrganFoxfolkFootLeft

- type: entity
  parent: [ OrganBaseFootRight, OrganFoxfolkExternal ]
  id: OrganFoxfolkFootRight

# Internal organs
- type: entity
  parent: [ OrganBaseBrain, OrganSpriteHumanInternal, OrganFoxfolkInternal ]
  id: OrganFoxfolkBrain

- type: entity
  parent: [ OrganFoxfolkVisual, OrganBaseEyes, OrganFoxfolkInternal ]
  id: OrganFoxfolkEyes
  components:
  - type: VisualOrgan
