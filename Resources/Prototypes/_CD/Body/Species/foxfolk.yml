      sprite: Mobs/Customization/eyes.rsi

- type: entity
  parent: [ OrganBaseTongue, OrganFoxfolkInternal ]
  id: OrganFoxfolkTongue

- type: entity
  parent: [ OrganBaseEars, OrganSpriteHumanInternal, OrganFoxfolkInternal ]
  id: OrganFoxfolkEars

- type: entity
  parent: [ OrganBaseLungs, OrganFoxfolkInternal, OrganFoxfolkMetabolizer ]
  id: OrganFoxfolkLungs

- type: entity
  parent: [ OrganBaseHeart, OrganFoxfolkInternal, OrganFoxfolkMetabolizer ]
  id: OrganFoxfolkHeart

- type: entity
  parent: [ OrganBaseKidneys, OrganSpriteHumanInternal, OrganFoxfolkInternal, OrganFoxfolkMetabolizer ]
  id: OrganFoxfolkKidneys
