- type: entity
  parent: BaseComputerAiAccess
  id: ComputerJobSlots
  name: job slots console
  description: Manage station job slots and positions.
  components:
  - type: Sprite
    layers:
    - map: [ "computerLayerBody" ]
      state: computer
    - map: [ "computerLayerKeyboard" ]
      state: generic_keyboard
    - map: [ "computerLayerScreen" ]
      state: command
    - map: [ "computerLayerKeys" ]
      state: generic_keys
    - map: [ "enum.WiresVisualLayers.MaintenancePanel" ]
      state: generic_panel_open
      visible: false
  - type: Computer
    board: JobSlotsComputerCircuitboard
  - type: DeviceNetworkRequiresPower
  - type: JobSlotsConsole
    blacklist:
    - Captain
    - CentralCommandOfficial
    - StationAi
    - Borg
    - CBURN
    - ERTLeader
    - ERTChaplain
    - ERTJanitor
    - ERTMedical
    - ERTSecurity
    - ERTEngineer
    - DeathSquad
  - type: ActivatableUI
    key: enum.JobSlotsConsoleUiKey.Key
  - type: ActivatableUIRequiresVision
  - type: Transform
    anchored: true
  - type: AccessReader
    access: [ [ "HeadOfPersonnel" ] ]
  - type: UserInterface
    interfaces:
      enum.JobSlotsConsoleUiKey.Key:
        type: JobSlotsConsoleBoundUserInterface
      enum.WiresUiKey.Key:
        type: WiresBoundUserInterface

- type: entity
  parent: BaseComputerShuttle
  id: ComputerShuttleSalvage
  name: salvage shuttle console
  description: Used to pilot the salvage shuttle.
  components:
  - type: Sprite
    layers:
    - map: [ "computerLayerBody" ]
      state: computer
    - map: [ "computerLayerKeyboard" ]
      state: generic_keyboard
    - map: [ "computerLayerScreen" ]
      state: shuttle
    - map: [ "computerLayerKeys" ]
      state: generic_keys
  - type: DroneConsole
    components:
    - type: SalvageShuttle
  - type: RadarConsole
    maxRange: 256
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#43CCB5"
  - type: Computer
    board: SalvageShuttleConsoleCircuitboard
