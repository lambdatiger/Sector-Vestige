- type: entity
  parent: BaseItem
  id: BaseGarmentBag
  name: debug garment bag
  suffix: DEBUG
  components:
  - type: Item
    size: Small
  - type: Tag
  - type: Sprite
    sprite: _CD/Objects/Misc/GarmentBags/debug.rsi
    state: icon
  - type: SpawnItemsOnUse
    items:
      - id: ClothingNeckCloakAdmin
      - id: ClothingUniformJumpsuitCentcomOfficial
      - id: PlushieLizard
    sound:
      path: /Audio/Effects/unwrap.ogg

- type: entity
  parent: BaseGarmentBag
  id: ETUGarmentBag
  name: etu garment can
  suffix: Pointman
  description: Contains one set of ETU equipment.
  components:
  - type: Sprite
    sprite: _CD/Objects/Misc/GarmentBags/medicalcan.rsi
    state: icon
  - type: SpawnItemsOnUse
    items:
      - id: ClothingBeltHarnessETU
      - id: ClothingHeadHelmetETUPointman
      - id: ClothingMaskGasETUSterile
      - id: ClothingHandsGlovesETUGauntlet
      - id: ClothingUniformJumpsuitETUFlightsuit
      - id: ClothingShoesColorSlate
