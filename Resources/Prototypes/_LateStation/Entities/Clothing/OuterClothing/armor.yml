- type: entity
  parent: [ClothingOuterBaseMedium, AllowSuitStorageClothing, BaseSecurityContraband]
  id: ClothingOuterArmorMetroCop
  name: enforcer armor
  description: A discontinued uniform built to make Security seem more upstanding, but unfortunately, the built-in drug injector didn't go over well with the ethics department. This one doesn't have an injector.'
  components:
  - type: Sprite
    sprite: _LateStation/Clothing/OuterClothing/Armor/metrocop.rsi
  - type: Clothing
    sprite: _LateStation/Clothing/OuterClothing/Armor/metrocop.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.70
        Slash: 0.70
        Piercing: 0.70 #Copied from the armor vest. Will take about 10 shots from a Viper before critting, as opposed to 7 while unarmored and 16~ with a bulletproof vest.
        Heat: 0.80
  - type: ExplosionResistance
    damageCoefficient: 0.90
