# Umbra: Red phone, but CentCom intercom from Harmony
- type: entity
  id: PhoneInstrumentCentcomm
  parent: PhoneInstrument
  name: red phone
  suffix: intercom
  description: Should anything ever go wrong...
  components:
  - type: Sprite
    sprite: Objects/Fun/Instruments/otherinstruments.rsi
    state: red_phone
  - type: EmitSoundOnLand
    sound:
      path: /Audio/Items/ring.ogg
  - type: Prayable
    sentMessage: prayer-popup-notify-centcom-sent
    notificationPrefix: prayer-chat-notify-centcom
    verb: prayer-verbs-call
    verbImage: null
  - type: Speech
    speechVerb: Robotic
  - type: EncryptionKeyHolder
    keySlots: 1
    keysUnlocked: false
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyCentCom
  - type: ContainerContainer
    containers:
      key_slots: !type:Container
  - type: TelecomExempt
  - type: RadioMicrophone
    unobstructedRequired: true
    listenRange: 2
    toggleOnInteract: false
  - type: RadioSpeaker
    toggleOnInteract: false
  - type: Intercom
    requiresPower: false
  - type: ActivatableUI
    key: enum.IntercomUiKey.Key
    singleUser: true
  - type: UserInterface
    interfaces:
      enum.IntercomUiKey.Key:
        type: IntercomBoundUserInterface
