  categories: [ HideSpawnMenu ]
  components:
  - type: Projectile
    damage:
      types:
        Piercing: 65

- type: entity
  id: BulletDeagleIncendiary
  name: bullet (.357 magnum incendiary)
  parent: BaseBulletIncendiary
  categories: [ HideSpawnMenu ]
