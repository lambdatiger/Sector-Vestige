# Ported from RMC14
- type: entity
  abstract: true
  id: RMCWheelchairBase
  parent: [ BaseItem, BaseDeployFoldable ]
  components:
  - type: Transform
  - type: Item
    size: Huge
    heldPrefix: wheelchair
  - type: Sprite
    drawdepth: Objects
    noRot: true
    sprite: Objects/Vehicles/wheelchair.rsi
    layers:
    - state: vehicle
      map: ["unfoldedLayer"]
    - state: vehicle_folded
      map: ["foldedLayer"]
      visible: false
  - type: MovedByPressure
  - type: DamageOnHighSpeedImpact
    soundHit:
      collection: MetalThud
  - type: MobMover
  - type: Puller
    needsHands: false
  - type: Pullable
  - type: InputMover
  - type: InteractionOutline
  - type: MovementSpeedModifier
    baseWalkSpeed: 2
    baseSprintSpeed: 3.5
  - type: Tag
    tags:
    - DoorBumpOpener
  - type: Physics
    bodyType: KinematicController
  - type: Clickable
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 500
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.RotationVisuals.RotationState:
        enum.RotationVisualLayers.Layer:
          North: { state: wheelchair, drawdepth: Mobs }
          South: { state: wheelchair, drawdepth: Mobs }
          East: { state: wheelchair, drawdepth: Objects }
          West: { state: wheelchair, drawdepth: Objects }
      enum.FoldedVisuals.State:
        foldedLayer:
          True: { visible: true }
          False: { visible: false }
        unfoldedLayer:
          True: { visible: false }
          False: { visible: true }
  - type: ContainerContainer
    containers:
      rmc-vehicle-pilot: !type:ContainerSlot
  - type: Damageable
  - type: Strap
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 200
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  parent: RMCWheelchairBase
  id: RMCWheelchair
  name: wheelchair
  description: Helps those with injuries related to immobility to move freely
  components:
  - type: RMCAllowStrapMovement
  - type: Wheelchair
    speedMultiplier: 0.75

- type: entity
  parent: RMCWheelchair
  id: RMCWheelchairSpawnFolded
  suffix: folded
  components:
  - type: Foldable
    folded: true
  - type: Strap
    enabled: False

- type: entity
  parent: RMCWheelchairBase
  id: RMCWheelchairBell
  name: wheelchair
  description: Helps those with injuries related to immobility to move freely. This one has a bell attached.
  components:
  - type: RMCAllowStrapMovement
  - type: Wheelchair
    speedMultiplier: 0.75
    bellAction: ActionWheelchairBell
  - type: ContainerContainer
    containers:
      rmc-vehicle-pilot: !type:ContainerSlot
      actions: !type:Container
  - type: ActionsContainer

- type: entity
  parent: RMCWheelchairBell
  id: RMCWheelchairBellSpawnFolded
  suffix: folded
  components:
  - type: Foldable
    folded: true
  - type: Strap
    enabled: False
