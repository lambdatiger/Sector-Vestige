# Welcome to the example configuration file!
# Remember that if this is in bin/Content.Server or such, it may be overwritten on build.
# Consider copying it and using the --config-file and --data-dir options.

[log]
path = "logs"
format = "log_%(date)s-%(time)s.txt"
level = 1
enabled = false

[net]
tickrate = 50
port = 1212
bindto = "::,0.0.0.0"
max_connections = 50
# Automatic port forwarding!
# Disabled by default because you may not want to do this.
# upnp = true

[status]
# The status server is the TCP side, used by the launcher to determine engine version, etc.
# To be clear: Disabling it makes the launcher unable to connect!
enabled = true

# This is the address and port the status server binds to.
# The port is by default set based on net.port so it will follow what you set there.
bind = "*:1212"

[ic]
flavor_text = true
flavor_text_length = 1024
# This is the address of the SS14 server as the launcher uses it.
# This is only needed if you're proxying the status HTTP server -
#  by default the launcher will assume the address and port match that of the status server.
connectaddress = "udp://server.sector-vestige.space:1212"

[game]
hostname = "[EN][HRP] Sector Vestige"
soft_max_players = 50
desc = "Description placeholder"
round_restart_time = 480
role_timers = false
respawn_time = 300
lobbyduration = 300
contraband_examine = false
defaultpreset = "VestigeExtended"
[admin]
bypass_max_players = true
admins_count_for_max_players = false
admins_count_in_playercount = true
#chat_discord_channel_id = 1395703647614140487

[ooc]
#discord_channel_id = 1395698555188150362

[replay]
#auto_record = true
#auto_record_temp_dir = "/temp_replay"

[shuttle]
emergency_early_launch_allowed = true
auto_call_time = 0
arrivals_returns = true
arrivals_planet = false
emergency_transit_time_min = 90
emergency_transit_time_max = 210

[vote]
preset_enabled = false

[infolinks]
#discord = "https://discord.gg/bSRydHCPMz"
github = "https://github.com/Sector-Vestige/Sector-Vestige"
website = "https://www.sector-vestige.space"

[whitelist]
enabled = false

[discord]
#ahelp_webhook = "https://discord.com/api/webhooks/1395693798432178216/mGn7z4qVhabSHDXuNCQ2r9eLfFWFh_zOJC8Ti4se0S_eUVCmn7zBbSAnTfioGI4d8U7g"
