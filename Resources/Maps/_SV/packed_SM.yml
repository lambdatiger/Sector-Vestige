      stampState: paper_stamp-warden
      stampedBy:
      - type: RubberStamp
        stampedColor: '#5B0000FF'
        stampedName: stamp-component-stamped-name-warden
      content: >-
        I own an Enforcer for Brig Defense, since thats what Central Command intended.

        Four Gorlex Marauders blow a hole through my brig with C-4.

        "What the devil?" I yell as I grab my Warden's Cap and Enforcer shotgun. Blow 4 twelve gauge holes through the Corpsman, he's crit on the spot.

        Draw my Mk58 on the second guy, miss her entirely because a secoff exploded with Tear Gas, it hits the HOP instead.

        I have to resort to the toolbox in my armory, filled to the brim with seized grenades. "GLORY TO NANOTRASEN!!" The resulting explosion instagibbing the Commander and an Operative, setting off all the firelocks on station.

        Draw my Stun Baton on the last terrified Operative, he dies from spacing waiting for the paramedic to arrive becuase I took his suit off immediately after cuffing him.


        Just as Central Command Intended.
      editingDisabled: True
