    - type: Paper
      content: >-
        Hey John, wasn't able to finish the hyper-convection lathe cooling system, so I've left instructions on how to finish it.


        Put passive vents underneath each of the lathes, I think I did one of them already? These should be facing towards the green pipe in the center. Make sure to grab the T-ray scanner I left with this note to see any pipes which are underneath floor tiles.


        Connect the green pipes to the machine frame across from the lathes. You'll need a machine board to finish the freezer, and probably some spare parts.


        Once the freezer is finished, hook it up to the green pipes and set it to 270K. Make sure you turn it on this time, we don't want a repeat of the containment field incident.


        DO NOT upgrade the lathes to hyper-convection until the system is finished, you'll ash me and every other moth in this department.


        Sorry again about not finishing it, but im sure you can figure it out!

        - Aurora
