name: "Labels: Branch"

# Tags PRs by which downstream branch they target. Replaces the separate
# labeler-staging / labeler-stable workflows.

on:
  pull_request_target:
    types:
      - opened
    branches:
      - 'staging'
      - 'stable'

jobs:
  add_label:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/github-script@v7
      with:
        script: |
          const base = context.payload.pull_request.base.ref;
          const label = base === 'stable' ? 'Branch: Stable' : 'Branch: Staging';
          await github.rest.issues.addLabels({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            labels: [label]
          });
