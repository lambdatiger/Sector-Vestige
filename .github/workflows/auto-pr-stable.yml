name: "Auto PR: staging -> stable"

# Manually-triggered workflow that keeps a single open pull request proposing to
# merge everything new on `staging` into `stable`. Run it from the Actions tab
# whenever you want to (re)build the promotion PR. Running it again refreshes the
# overview in the body of the existing PR.

on:
  workflow_dispatch:

concurrency:
  group: auto-pr-staging-stable
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  open-pr:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          # Use a PAT (not the default GITHUB_TOKEN) so the resulting PR is
          # treated as user-created and triggers the normal CI workflows
          # (build-test, yaml-linter, RSI checks, ...).
          github-token: ${{ secrets.WEH_BOT_PAT }}
          script: |
            const base = 'stable';
            const head = 'staging';
            const { owner, repo } = context.repo;
            const today = new Date().toISOString().slice(0, 10).split('-').reverse().join('-');

            // 1. Collect the commits that staging is ahead of stable by.
            const cmp = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `${base}...${head}`,
            });
            const commits = cmp.data.commits;
            if (cmp.data.total_commits === 0 || commits.length === 0) {
              core.info('No delta between staging and stable — nothing to propose.');
              return;
            }
            core.info(`staging is ahead of stable by ${cmp.data.total_commits} commit(s).`);

            // 2. Resolve those commits to the PRs they came from. Prefer parsing
            //    the merge style ("(#NNN)" squash titles / "Merge pull request
            //    #NNN"); fall back to the associated-PRs API otherwise.
            const prNumbers = [];
            const seen = new Set();
            const directCommits = [];
            const addPr = (n) => { if (!seen.has(n)) { seen.add(n); prNumbers.push(n); } };

            // Automated bot commits to leave out of the overview. Skipping the
            // changelog commits is safe: the real PR they reference is already
            // captured by its own merge/squash commit.
            const EXCLUDE_SUBJECT = [
              /^Update changelog for PR\b/i,
              /^chore: automatically update REUSE headers\b/i,
              // The automated promotion PRs are noise in a promotion overview. This catches
              // them when squash-merged (subject carries the PR title); the title-based filter
              // in the render step below also covers merge-commit / associated-PR resolution.
              /^Auto: sync master into staging\b/i,
              /^Auto: sync staging into stable\b/i,
            ];

            for (const c of commits) {
              const firstLine = c.commit.message.split('\n', 1)[0];
              if (EXCLUDE_SUBJECT.some((re) => re.test(firstLine))) continue;
              const squash = firstLine.match(/\(#(\d+)\)\s*$/);
              const merge = c.commit.message.match(/Merge pull request #(\d+)/);
              if (squash) {
                addPr(parseInt(squash[1], 10));
              } else if (merge) {
                addPr(parseInt(merge[1], 10));
              } else {
                const assoc = await github.rest.repos.listPullRequestsAssociatedWithCommit({
                  owner,
                  repo,
                  commit_sha: c.sha,
                });
                // A commit in staging's history may be associated with the PR
                // that merged it into master *or* staging; accept either base.
                const merged = assoc.data.filter((p) => p.base && (p.base.ref === 'master' || p.base.ref === head));
                if (merged.length) {
                  merged.forEach((p) => addPr(p.number));
                } else {
                  directCommits.push(c);
                }
              }
            }

            // 3. Render the overview body.
            const MAX_LISTED = 100;
            const lines = [
              'Automated pull request keeping **`stable`** in sync with **`staging`**.',
              '',
              `Generated by the \`Auto PR: staging -> stable\` workflow on ${today}.`,
              '',
              '---',
              '',
            ];

            // Resolve PR numbers to objects, dropping the automated promotion PRs themselves.
            // Their own "Auto: sync ..." PR lands in this delta once merged, but listing it in
            // the next promotion overview is just noise. EXCLUDE_SUBJECT already drops the
            // squash-merged ones; the title check here also covers merge-commit resolution.
            const queued = [];
            for (const n of prNumbers) {
              try {
                const { data: pr } = await github.rest.pulls.get({ owner, repo, pull_number: n });
                if (/^Auto: sync\b/i.test(pr.title)) continue;
                const author = pr.user ? `@${pr.user.login}` : 'unknown';
                queued.push(`- [ ] #${n} — ${pr.title} (${author})`);
              } catch (err) {
                // Number might reference an issue or a PR we can't read; list it bare.
                queued.push(`- [ ] #${n}`);
              }
            }

            if (queued.length > 0) {
              lines.push(`### Pull requests queued for \`stable\` (${queued.length})`);
              lines.push('');
              for (const entry of queued.slice(0, MAX_LISTED)) {
                lines.push(entry);
              }
              if (queued.length > MAX_LISTED) {
                lines.push('');
                lines.push(`…and ${queued.length - MAX_LISTED} more.`);
              }
            } else {
              lines.push('### Pull requests queued for `stable`');
              lines.push('');
              lines.push('_No PR-associated commits found in the delta._');
            }

            if (directCommits.length > 0) {
              lines.push('');
              lines.push(`<details><summary>Direct commits without an associated PR (${directCommits.length})</summary>`);
              lines.push('');
              for (const c of directCommits.slice(0, MAX_LISTED)) {
                const subject = c.commit.message.split('\n', 1)[0];
                lines.push(`- ${c.sha.slice(0, 8)} ${subject}`);
              }
              lines.push('');
              lines.push('</details>');
            }

            const body = lines.join('\n');
            const title = `Auto: sync staging into stable (${today})`;

            // 4. Create the PR, or refresh the body of the one already open.
            const existing = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base,
              head: `${owner}:${head}`,
            });

            if (existing.data.length > 0) {
              const pr = existing.data[0];
              await github.rest.pulls.update({ owner, repo, pull_number: pr.number, title, body });
              core.info(`Refreshed overview on existing PR #${pr.number}: ${pr.html_url}`);
              return;
            }

            let pr;
            try {
              const created = await github.rest.pulls.create({
                owner,
                repo,
                base,
                head,
                title,
                body,
                maintainer_can_modify: true,
              });
              pr = created.data;
            } catch (err) {
              core.warning(`pulls.create failed: ${err.message}`);
              const recheck = await github.rest.pulls.list({
                owner, repo, state: 'open', base, head: `${owner}:${head}`,
              });
              if (recheck.data.length > 0) {
                await github.rest.pulls.update({ owner, repo, pull_number: recheck.data[0].number, body });
                core.info(`PR existed from a concurrent run; refreshed #${recheck.data[0].number}`);
                return;
              }
              throw err;
            }

            core.info(`Opened PR #${pr.number}: ${pr.html_url}`);

            // 5. Label it. (Belt-and-suspenders: the `Labels: Branch stable`
            //    workflow also fires since this PR is created by a real user/PAT.)
            try {
              await github.rest.issues.addLabels({
                owner,
                repo,
                issue_number: pr.number,
                labels: ['Branch: Stable', 'Maintenance'],
              });
            } catch (err) {
              core.warning(`Could not add 'Branch: Stable' label: ${err.message}`);
            }
